<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Health Quiz</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="shell">
    <section class="intro">
      <div>
        <p class="eyebrow">Health quiz demo</p>
        <h1>Answer a few questions to get a basic plan.</h1>
        <p class="lead">This demo focuses on saved progress, server-side calculation, and paid result access.</p>
      </div>
      <div class="status-panel">
        <span id="sessionBadge">Starting session...</span>
        <button id="resetBtn" type="button">New session</button>
      </div>
    </section>

    <section class="workspace">
      <aside class="rail" id="rail"></aside>
      <section class="panel" id="app"></section>
    </section>
  </main>
  <script type="module" src="/app.js"></script>
</body>
</html>
